name: Fetch Crypto Prices

on:
  schedule:
    - cron: '*/15 * * * *'  # 每 15 分鐘執行
  workflow_dispatch:          # 可手動觸發

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch prices from Binance
        run: |
          BTC=$(curl -s "https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['price'])")
          ETH=$(curl -s "https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['price'])")
          BTC_24H=$(curl -s "https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['priceChangePercent'])")
          ETH_24H=$(curl -s "https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['priceChangePercent'])")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > price.json << EOF
          {
            "updated_at": "$TIMESTAMP",
            "source": "Binance",
            "prices": {
              "BTCUSDT": {
                "price": $BTC,
                "change_24h_pct": $BTC_24H
              },
              "ETHUSDT": {
                "price": $ETH,
                "change_24h_pct": $ETH_24H
              }
            }
          }
          EOF

      - name: Commit & push price.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price.json
          git diff --staged --quiet || git commit -m "chore: update prices @ $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
