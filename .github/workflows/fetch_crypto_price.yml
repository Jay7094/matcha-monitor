name: Fetch Crypto Prices

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch prices from CoinGecko
        run: |
          RESPONSE=$(curl -s "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true")
          echo "API response: $RESPONSE"

          BTC=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['bitcoin']['usd'])")
          ETH=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['ethereum']['usd'])")
          BTC_24H=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(round(d['bitcoin']['usd_24h_change'],2))")
          ETH_24H=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(round(d['ethereum']['usd_24h_change'],2))")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > price.json << EOF
          {
            "updated_at": "$TIMESTAMP",
            "source": "CoinGecko",
            "prices": {
              "BTC": {
                "price_usd": $BTC,
                "change_24h_pct": $BTC_24H
              },
              "ETH": {
                "price_usd": $ETH,
                "change_24h_pct": $ETH_24H
              }
            }
          }
          EOF
          cat price.json

      - name: Commit & push price.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price.json
          git diff --staged --quiet || (
            git commit -m "chore: update prices @ $(date -u +'%Y-%m-%d %H:%M UTC')" &&
            git pull --rebase origin main &&
            git push
          )
